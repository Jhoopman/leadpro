<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LeadPro — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green:      #2D6A4F;
  --green-mid:  #3a7a5f;
  --green-text: #74C69D;
  --bg:         #080d0a;
  --bg2:        #0f1510;
  --bg3:        #0c1209;
  --border:     rgba(116,198,157,0.09);
  --border2:    rgba(255,255,255,0.05);
  --text:       #edf5f0;
  --text2:      #8ea898;
  --text3:      #3d5045;
  --red:        #f87171;
  --radius:     12px;
}

body {
  font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(45,106,79,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 50% 35% at 85% 85%, rgba(45,106,79,0.09) 0%, transparent 55%);
}

.auth-wrap {
  width: 100%;
  max-width: 384px;
  animation: lp-rise 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes lp-rise {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Brand ── */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 30px;
}
.brand svg { width: 26px; height: 26px; fill: var(--green-text); flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(116,198,157,0.4)); }
.brand-name { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.025em; }
.brand-sub   { font-size: 11.5px; color: var(--text3); margin-top: 2px; text-align: center; letter-spacing: 0.01em; }

/* ── Card ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px 24px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.4),
    0 20px 50px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(116,198,157,0.06);
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 3px;
  background: var(--bg3);
  border-radius: 11px;
  padding: 3px;
  margin-bottom: 22px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  text-align: center;
  padding: 8px 6px;
  border-radius: 9px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text3);
  transition: all .2s;
  border: none;
  background: none;
  font-family: inherit;
  letter-spacing: 0.005em;
}
.tab.active {
  background: rgba(45,106,79,0.3);
  color: var(--green-text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.35), inset 0 1px 0 rgba(116,198,157,0.12);
}
.tab:hover:not(.active) { color: var(--text2); }

/* ── Fields ── */
.field { margin-bottom: 13px; }
.field label {
  display: block;
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 14px;
  color: var(--text);
  font-family: inherit;
  outline: none;
  transition: border-color .18s, box-shadow .18s;
}
.field input:focus {
  border-color: rgba(116,198,157,0.45);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.18);
}
.field input::placeholder { color: var(--text3); }

/* ── Submit button ── */
.submit-btn {
  width: 100%;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 11px;
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin-top: 4px;
  transition: background .15s, transform .1s, box-shadow .15s;
  letter-spacing: 0.01em;
  position: relative;
  overflow: hidden;
}
.submit-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.submit-btn:hover:not(:disabled) {
  background: var(--green-mid);
  box-shadow: 0 4px 18px rgba(45,106,79,0.35);
  transform: translateY(-1px);
}
.submit-btn:active:not(:disabled) { transform: translateY(0); }
.submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── Messages ── */
.error-msg {
  color: var(--red);
  font-size: 12.5px;
  margin-top: 12px;
  min-height: 18px;
  line-height: 1.4;
}
.success-msg {
  color: var(--green-text);
  font-size: 12.5px;
  margin-top: 12px;
  line-height: 1.4;
}

/* ── Footer ── */
.auth-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: var(--text3);
  line-height: 1.7;
}
.auth-footer a { color: var(--text3); text-decoration: underline; transition: color .15s; }
.auth-footer a:hover { color: var(--text2); }

/* ── Trial badge ── */
.trial-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(45,106,79,0.14);
  border: 1px solid rgba(116,198,157,0.22);
  border-radius: 10px;
  padding: 9px 13px;
  margin-bottom: 20px;
  font-size: 12.5px;
  color: var(--green-text);
  font-weight: 500;
}
.trial-badge svg { width: 14px; height: 14px; fill: var(--green-text); flex-shrink: 0; }

/* ── SMS consent ── */
label span { font-size: 12px; color: var(--text2); line-height: 1.55; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="brand">
    <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.83 3.36 20.63 2 20.28 2 19.37V4.5A2.5 2.5 0 014.5 2h15A2.5 2.5 0 0122 4.5v10a2.5 2.5 0 01-2.5 2.5H17V8z"/></svg>
    <div>
      <div class="brand-name">LeadPro</div>
      <div class="brand-sub">AI scheduling for contractors</div>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-signin" onclick="showTab('signin')">Sign in</button>
      <button class="tab"        id="tab-signup" onclick="showTab('signup')">Create account</button>
    </div>

    <!-- SIGN IN -->
    <div id="form-signin">

      <!-- Normal sign-in fields -->
      <div id="signin-fields">
        <div class="field">
          <label>Email</label>
          <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="si-pass" placeholder="Your password" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter') submitSignIn()">
        </div>
        <div style="text-align:right;margin:-4px 0 14px">
          <button type="button" onclick="showForgot()"
                  style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;padding:0;transition:color .15s"
                  onmouseover="this.style.color='var(--green-text)'" onmouseout="this.style.color='var(--text2)'">
            Forgot password?
          </button>
        </div>
        <button class="submit-btn" id="si-btn" onclick="submitSignIn()">Sign in</button>
        <div class="error-msg" id="si-err"></div>
      </div>

      <!-- Forgot-password inline form (hidden until link is clicked) -->
      <div id="forgot-fields" style="display:none">
        <div class="field">
          <label>Your email</label>
          <input type="email" id="fp-email" placeholder="you@example.com" autocomplete="email"
                 onkeydown="if(event.key==='Enter') submitForgot()">
        </div>
        <button class="submit-btn" id="fp-btn" onclick="submitForgot()">Send reset link</button>
        <div class="error-msg"   id="fp-err"></div>
        <div class="success-msg" id="fp-ok"  style="display:none"></div>
        <div style="margin-top:12px;text-align:center">
          <button type="button" onclick="hideForgot()"
                  style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;padding:0;transition:color .15s"
                  onmouseover="this.style.color='var(--text2)'" onmouseout="this.style.color='var(--text3)'">
            ← Back to sign in
          </button>
        </div>
      </div>

    </div>

    <!-- SIGN UP -->
    <div id="form-signup" style="display:none">
      <div class="trial-badge">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        14-day free trial — no credit card required
      </div>
      <div class="field">
        <label>Business name</label>
        <input type="text" id="su-biz" placeholder="Green Lawn Co.">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mobile number for lead alerts</label>
        <input type="tel" id="su-mobile" placeholder="+1 (540) 555-0192" autocomplete="tel"
               oninput="validateSignupForm()" onblur="normalizeMobile()">
      </div>
      <div class="field">
        <label>Password (min 6 characters)</label>
        <input type="password" id="su-pass" placeholder="Create a password" autocomplete="new-password"
               oninput="validateSignupForm()"
               onkeydown="if(event.key==='Enter') submitSignUp()">
      </div>
      <div style="margin-bottom:14px">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
          <input type="checkbox" id="sms-consent" onchange="validateSignupForm()"
                 style="margin-top:2px;flex-shrink:0;accent-color:#2D6A4F">
          <span style="font-size:12px;color:#aaaaaa;line-height:1.5">I agree to receive SMS alerts from LeadPro about new leads, bookings, and account activity. Message and data rates may apply. Message frequency varies. Reply HELP for help, STOP to cancel.</span>
        </label>
      </div>
      <div style="text-align:center;margin-bottom:12px;font-size:11px;color:#555555">
        <a href="/privacy" target="_blank" rel="noopener" style="color:#555555">Privacy Policy</a>
        &nbsp;·&nbsp;
        <a href="/terms" target="_blank" rel="noopener" style="color:#555555">Terms</a>
      </div>
      <button class="submit-btn" id="su-btn" onclick="submitSignUp()" disabled>Create account</button>
      <div class="error-msg"   id="su-err"></div>
      <div class="success-msg" id="su-ok"  style="display:none"></div>
    </div>
  </div>

  <div class="auth-footer">
    By using LeadPro you agree to our
    <a href="/terms.html" target="_blank">Terms</a> &amp;
    <a href="/privacy.html" target="_blank">Privacy Policy</a>
  </div>
</div>

<script>
// ── MOBILE NORMALISATION + SIGNUP VALIDATION ──────────────────────────────────

function normalizeMobile() {
  const el    = document.getElementById('su-mobile');
  const raw   = el.value;
  const digits = raw.replace(/\D/g, '');
  if (digits.length === 10) {
    el.value = '+1' + digits;
  } else if (digits.length === 11 && digits[0] === '1') {
    el.value = '+' + digits;
  } else if (raw.startsWith('+') && digits.length >= 10) {
    el.value = '+' + digits;
  }
  validateSignupForm();
}

function isValidE164(val) {
  return /^\+1\d{10}$/.test(val);
}

function validateSignupForm() {
  const mobile  = (document.getElementById('su-mobile')?.value  || '').trim();
  const consent = document.getElementById('sms-consent')?.checked;
  const btn     = document.getElementById('su-btn');
  if (btn) btn.disabled = !(isValidE164(mobile) && consent);
}

// ── TAB TOGGLE ────────────────────────────────────────────────────────────────

function showTab(tab) {
  document.getElementById('form-signin').style.display = tab === 'signin' ? '' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  // Clear any stale errors when switching tabs
  document.getElementById('si-err').textContent = '';
  document.getElementById('su-err').textContent = '';
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────────────────

function showForgot() {
  document.getElementById('signin-fields').style.display = 'none';
  document.getElementById('forgot-fields').style.display = '';
  document.getElementById('fp-email').value = document.getElementById('si-email').value;
  document.getElementById('fp-err').textContent = '';
  document.getElementById('fp-ok').style.display = 'none';
}

function hideForgot() {
  document.getElementById('forgot-fields').style.display = 'none';
  document.getElementById('signin-fields').style.display = '';
  document.getElementById('fp-err').textContent = '';
}

async function submitForgot() {
  const email = document.getElementById('fp-email').value.trim();
  const errEl = document.getElementById('fp-err');
  const okEl  = document.getElementById('fp-ok');
  const btn   = document.getElementById('fp-btn');

  errEl.textContent  = '';
  okEl.style.display = 'none';

  if (!email) { errEl.textContent = 'Please enter your email address'; return; }

  btn.textContent = 'Sending…';
  btn.disabled    = true;

  try {
    await fetch('/auth/forgot-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email }),
    });
    // Always show success — never reveal whether the email exists
    okEl.textContent   = 'Check your email for a reset link';
    okEl.style.display = 'block';
  } catch (e) {
    errEl.textContent = 'Connection error — please try again';
  } finally {
    btn.textContent = 'Send reset link';
    btn.disabled    = false;
  }
}

// ── SIGN IN ───────────────────────────────────────────────────────────────────

async function submitSignIn() {
  const email  = document.getElementById('si-email').value.trim();
  const pass   = document.getElementById('si-pass').value;
  const errEl  = document.getElementById('si-err');
  const btn    = document.getElementById('si-btn');

  errEl.textContent = '';

  if (!email || !pass) {
    errEl.textContent = 'Please enter your email and password';
    return;
  }

  btn.textContent = 'Signing in…';
  btn.disabled    = true;

  try {
    const res  = await fetch('/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Sign in failed';
      btn.textContent   = 'Sign in';
      btn.disabled      = false;
      return;
    }

    storeSession(data);
    btn.textContent = 'Redirecting…';
    window.location.replace('/app');

  } catch (e) {
    console.error('[auth/signin] fetch error:', e);
    errEl.textContent = 'Connection error — please try again';
    btn.textContent   = 'Sign in';
    btn.disabled      = false;
  }
}

// ── SIGN UP ───────────────────────────────────────────────────────────────────

async function submitSignUp() {
  const biz    = document.getElementById('su-biz').value.trim();
  const email  = document.getElementById('su-email').value.trim();
  const mobile = document.getElementById('su-mobile').value.trim();
  const pass   = document.getElementById('su-pass').value;
  const consent = document.getElementById('sms-consent').checked;
  const errEl  = document.getElementById('su-err');
  const btn    = document.getElementById('su-btn');

  errEl.textContent = '';

  if (!biz || !email || !pass) {
    errEl.textContent = 'All fields are required';
    return;
  }
  if (!/\S+@\S+\.\S+/.test(email)) {
    errEl.textContent = 'Please enter a valid email address';
    return;
  }
  if (pass.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters';
    return;
  }
  if (!isValidE164(mobile)) {
    errEl.textContent = 'Please enter a valid US mobile number';
    return;
  }
  if (!consent) {
    errEl.textContent = 'Please agree to receive SMS alerts to continue';
    return;
  }

  btn.textContent = 'Creating account…';
  btn.disabled    = true;

  try {
    const res  = await fetch('/auth/signup', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        email,
        password:          pass,
        business_name:     biz,
        mobile_phone:      mobile,
        sms_consent_given: true,
      }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Could not create account';
      btn.textContent   = 'Create account';
      btn.disabled      = false;
      return;
    }

    storeSession(data);

    // Record IP + UA for consent audit trail (fire-and-forget)
    const contractorId = data.contractor?.id;
    if (contractorId) {
      fetch('/api/log-consent', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ contractor_id: contractorId, user_agent: navigator.userAgent }),
      }).catch(() => {});
    }

    // If a plan was passed (e.g. from pricing page), go to Stripe checkout now
    const plan = new URLSearchParams(window.location.search).get('plan');
    if (plan === 'starter' || plan === 'pro') {
      btn.textContent = 'Redirecting to checkout…';
      await startCheckoutWithToken(plan, data.access_token, contractorId);
      return;
    }

    const wid  = data.widget_id || data.contractor?.widget_id;
    const okEl = document.getElementById('su-ok');
    if (okEl) {
      okEl.textContent   = wid
        ? `Account created! Your widget ID is: ${wid} — redirecting to your dashboard…`
        : 'Account created! Redirecting…';
      okEl.style.display = 'block';
    }
    btn.textContent = 'Redirecting…';
    setTimeout(() => window.location.replace('/app'), 1200);

  } catch (e) {
    console.error('[auth/signup] fetch error:', e);
    errEl.textContent = 'Connection error — please try again';
    btn.textContent   = 'Create account';
    btn.disabled      = false;
  }
}

// ── CHECKOUT REDIRECT ─────────────────────────────────────────────────────────

async function startCheckoutWithToken(plan, token, contractorId) {
  try {
    // Resolve contractorId: prefer explicit arg, fall back to localStorage (already-logged-in path)
    const cid = contractorId || localStorage.getItem('leadpro_contractor_id');
    if (!cid) { window.location.replace('/app'); return; }

    const res  = await fetch('/create-checkout-session', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body:    JSON.stringify({ plan, contractorId: cid }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      window.location.replace('/app');
    }
  } catch (e) {
    console.error('[auth/checkout] fetch error:', e);
    window.location.replace('/app');
  }
}

// ── SESSION STORAGE ───────────────────────────────────────────────────────────

function storeSession(data) {
  localStorage.setItem('leadpro_token',         data.access_token);
  localStorage.setItem('leadpro_refresh_token', data.refresh_token || '');
  if (data.expires_at) {
    localStorage.setItem('leadpro_expires_at', String(data.expires_at));
  }
  if (data.contractor?.id) {
    localStorage.setItem('leadpro_contractor_id', data.contractor.id);
  }
  const wid = data.widget_id || data.contractor?.widget_id;
  if (wid) {
    localStorage.setItem('leadpro_widget_id', wid);
  }
}

// ── INIT: honour ?tab=signup or /signup path, redirect if already logged in ──

(function init() {
  // Already have a valid-looking token → skip to app
  if (localStorage.getItem('leadpro_token')) {
    // If a plan param is present, go straight to checkout
    const plan = new URLSearchParams(window.location.search).get('plan');
    if (plan) {
      startCheckoutWithToken(plan, localStorage.getItem('leadpro_token'));
    } else {
      window.location.replace('/app');
    }
    return;
  }
  const params = new URLSearchParams(window.location.search);
  const tab    = params.get('tab');
  // /signup path or ?tab=signup both open the create-account form
  if (tab === 'signup' || window.location.pathname === '/signup') showTab('signup');
})();
</script>
</body>
</html>
