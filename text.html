<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get a Text from LeadPro</title>
  <meta name="description" content="Opt in to receive a text message back from LeadPro." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0A0A0A; color: #e5e5e5; line-height: 1.75; -webkit-font-smoothing: antialiased; }
    nav { background: #111111; border-bottom: 1px solid #1f1f1f; padding: 0 24px; height: 64px; display: flex; align-items: center; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; font-weight: 700; font-size: 1.2rem; color: #74C69D; }
    .logo-mark { width: 30px; height: 30px; background: #2D6A4F; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    main { max-width: 520px; margin: 0 auto; padding: 64px 24px 96px; }
    h1 { font-size: 2rem; font-weight: 700; color: #ffffff; margin-bottom: 12px; }
    .subtitle { color: #aaaaaa; margin-bottom: 40px; }
    label { display: block; font-size: 0.9rem; color: #aaaaaa; margin-bottom: 6px; }
    input[type="text"], input[type="tel"] {
      width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #e5e5e5; font-family: inherit; font-size: 1rem;
      margin-bottom: 20px; outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="tel"]:focus { border-color: #74C69D; }
    .consent-block { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .consent-block input[type="checkbox"] { margin-top: 4px; width: 16px; height: 16px; flex-shrink: 0; accent-color: #74C69D; cursor: pointer; }
    .consent-label { font-size: 0.83rem; color: #888888; line-height: 1.6; }
    .legal-links { font-size: 0.82rem; color: #555; margin-bottom: 28px; padding-left: 28px; }
    .legal-links a { color: #74C69D; text-decoration: none; }
    .legal-links a:hover { text-decoration: underline; }
    button[type="submit"] {
      width: 100%; padding: 14px; background: #2D6A4F; color: #ffffff;
      border: none; border-radius: 8px; font-family: inherit; font-size: 1rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s, opacity 0.15s;
    }
    button[type="submit"]:enabled:hover { background: #3a8a65; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }
    .msg { margin-top: 20px; font-size: 0.9rem; min-height: 1.4em; }
    .msg.ok { color: #74C69D; }
    .msg.err { color: #e05c5c; }
    a { color: #74C69D; text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer { border-top: 1px solid #1f1f1f; padding: 24px; text-align: center; font-size: 0.82rem; color: #555; }
    footer a { color: #555; margin: 0 10px; }
    footer a:hover { color: #74C69D; }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/">
    <span class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 13L8 3L13 13H3Z" fill="#74C69D"/></svg>
    </span>
    LeadPro
  </a>
</nav>

<main>
  <h1>Get a text back from LeadPro.</h1>
  <p class="subtitle">Enter your number and we'll text you back about your request.</p>

  <form id="opt-in-form" novalidate>
    <label for="name">Name (optional)</label>
    <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" />

    <label for="phone">Phone number <span style="color:#e05c5c">*</span></label>
    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" autocomplete="tel" required />

    <div class="consent-block">
      <input type="checkbox" id="consent" name="consent" />
      <label class="consent-label" for="consent">I agree to receive text messages from LeadPro about my request, appointment scheduling, and related follow-ups. Message frequency varies. Message and data rates may apply. Reply HELP for help, STOP to cancel.</label>
    </div>

    <p class="legal-links">
      <a href="/privacy">Privacy Policy</a> &nbsp;&middot;&nbsp; <a href="/terms">Terms of Service</a>
    </p>

    <button type="submit" id="submit-btn" disabled>Send my number</button>
    <p class="msg" id="msg" aria-live="polite"></p>
  </form>
</main>

<footer>
  <p>&copy; 2026 LeadPro, Inc. &nbsp;|&nbsp; <a href="/">Home</a> <a href="/privacy">Privacy Policy</a> <a href="/terms">Terms of Service</a> <a href="/text">SMS Opt-In</a></p>
</footer>

<script>
  const checkbox  = document.getElementById('consent');
  const submitBtn = document.getElementById('submit-btn');
  const msg       = document.getElementById('msg');

  const CONSENT_TEXT = 'I agree to receive text messages from LeadPro about my request, appointment scheduling, and related follow-ups. Message frequency varies. Message and data rates may apply. Reply HELP for help, STOP to cancel.';

  checkbox.addEventListener('change', () => {
    submitBtn.disabled = !checkbox.checked;
  });

  document.getElementById('opt-in-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.textContent = '';
    msg.className = 'msg';

    const phone = document.getElementById('phone').value.trim();
    const name  = document.getElementById('name').value.trim();

    if (!phone) {
      msg.textContent = 'Please enter your phone number.';
      msg.className = 'msg err';
      return;
    }
    if (!checkbox.checked) {
      msg.textContent = 'Please check the consent box to continue.';
      msg.className = 'msg err';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';

    try {
      const res = await fetch('/api/sms-consent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, consent: true, consent_text: CONSENT_TEXT }),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.textContent = "You’re all set! You’ll receive a text shortly.";
        msg.className = 'msg ok';
        document.getElementById('opt-in-form').reset();
        submitBtn.disabled = true;
      } else {
        throw new Error(data.error || 'Something went wrong.');
      }
    } catch (err) {
      msg.textContent = err.message || 'Something went wrong. Please try again.';
      msg.className = 'msg err';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send my number';
    }
  });
</script>
</body>
</html>
