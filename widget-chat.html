<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — LeadPro</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a4d2e;
  --green-mid:#2d7a4e;
  --green-light:#3da368;
  --accent:#4cca74;
  --bg:#f5f5f3;
  --bg2:#ebebea;
  --text:#1c1c1a;
  --muted:#88887f;
  --border:rgba(0,0,0,0.09);
  --red:#e85d3a;
}
html,body{height:100%;width:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;}
#wrap{display:flex;flex-direction:column;height:100%;background:#fff;}

/* ── Header ── */
#hdr{
  background:var(--green);
  padding:12px 14px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  box-shadow:0 1px 0 rgba(0,0,0,0.12);
}
.lc-av{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.lc-av svg{width:18px;height:18px;fill:rgba(255,255,255,0.9);}
.lc-info{flex:1;min-width:0;}
.lc-name{
  font-size:13px;font-weight:600;color:#e8f5ec;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.01em;
}
.lc-status{
  font-size:11px;color:rgba(255,255,255,0.55);
  display:flex;align-items:center;gap:4px;margin-top:2px;
}
.lc-dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;
  animation:lc-pulse 2s ease-in-out infinite;
}
@keyframes lc-pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#lc-powered{
  font-size:10px;font-weight:500;color:rgba(255,255,255,0.35);
  text-decoration:none;flex-shrink:0;
  transition:color 0.15s;
}
#lc-powered:hover{color:rgba(255,255,255,0.7);}

/* ── Messages ── */
#msgs{
  flex:1;overflow-y:auto;
  padding:14px 12px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-track{background:transparent;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.lc-msg{max-width:84%;display:flex;flex-direction:column;gap:3px;}
.lc-msg.bot{align-self:flex-start;}
.lc-msg.user{align-self:flex-end;}

.lc-bubble{
  padding:9px 12px;border-radius:14px;
  font-size:13px;line-height:1.55;word-break:break-word;
}
.bot .lc-bubble{
  background:var(--bg2);color:var(--text);
  border-bottom-left-radius:3px;
}
.user .lc-bubble{
  background:var(--green);color:rgba(255,255,255,0.93);
  border-bottom-right-radius:3px;
}
.lc-ts{
  font-size:10px;color:var(--muted);padding:0 3px;
  line-height:1;
}
.user .lc-ts{text-align:right;}

/* ── Typing indicator ── */
#lc-typing{
  align-self:flex-start;
  padding:10px 13px;
  background:var(--bg2);border-radius:14px;border-bottom-left-radius:3px;
  display:none;gap:4px;align-items:center;
}
#lc-typing span{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  animation:lc-blink 0.9s ease-in-out infinite;display:block;
}
#lc-typing span:nth-child(2){animation-delay:0.3s}
#lc-typing span:nth-child(3){animation-delay:0.6s}
@keyframes lc-blink{
  0%,100%{opacity:0.2}
  50%{opacity:1}
}

/* ── Lead success card ── */
#lc-success{
  display:none;
  flex-direction:column;align-items:center;
  margin:4px 12px 8px;
  background:linear-gradient(135deg,#eaf6ef,#f0faf3);
  border:1px solid #b2dcc4;border-radius:12px;
  padding:16px 14px;gap:10px;
  animation:lc-card-in 0.4s cubic-bezier(0.34,1.2,0.64,1) both;
}
@keyframes lc-card-in{
  0%{opacity:0;transform:translateY(10px) scale(0.96)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
#lc-success .lc-check{
  width:40px;height:40px;border-radius:50%;
  background:#1a4d2e;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#lc-success .lc-check svg{width:20px;height:20px;}
#lc-success .lc-sc-title{
  font-size:13px;font-weight:700;color:#1a4d2e;
  text-align:center;letter-spacing:0.01em;
}
#lc-success .lc-sc-sub{
  font-size:11.5px;color:#4a7a5e;text-align:center;line-height:1.5;
}
.lc-fields{
  width:100%;display:grid;grid-template-columns:1fr 1fr;gap:5px 10px;
}
.lc-field label{
  font-size:10px;color:#5a8a6a;text-transform:uppercase;
  letter-spacing:0.04em;font-weight:600;display:block;margin-bottom:1px;
}
.lc-field span{font-size:12px;font-weight:500;color:var(--text);}

/* ── Error banner ── */
#lc-err{
  padding:8px 14px;font-size:12px;color:#a32d2d;
  background:#fdecea;text-align:center;display:none;
  border-bottom:1px solid rgba(163,45,45,0.12);
  flex-shrink:0;
}

/* ── Input bar ── */
#bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 11px;
  border-top:1px solid var(--border);
  background:#fff;flex-shrink:0;
}
#lc-inp{
  flex:1;border:1.5px solid var(--border);border-radius:18px;
  padding:8px 14px;font-size:13px;font-family:inherit;
  background:var(--bg2);color:var(--text);outline:none;
  transition:border-color 0.18s,box-shadow 0.18s;
  min-width:0;
}
#lc-inp:focus{
  border-color:var(--green-mid);
  box-shadow:0 0 0 3px rgba(26,77,46,0.08);
  background:#fff;
}
#lc-inp::placeholder{color:var(--muted);}
#lc-inp:disabled{opacity:0.5;cursor:default;}
#lc-sbtn{
  width:36px;height:36px;border-radius:50%;
  background:var(--green);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background 0.18s,transform 0.15s;
}
#lc-sbtn:hover{background:var(--green-mid);transform:scale(1.06);}
#lc-sbtn:active{transform:scale(0.95);}
#lc-sbtn svg{width:15px;height:15px;fill:rgba(255,255,255,0.93);}
#lc-sbtn:disabled{opacity:0.45;cursor:default;transform:none;}

/* ── Quick-reply buttons ── */
#lc-qr{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:2px 0 4px;
  align-self:flex-start;
}
.lc-qr-btn{
  background:#1a3a2a;
  color:#74C69D;
  border:1.5px solid #74C69D;
  border-radius:50px;
  padding:6px 13px;
  font-size:13px;
  font-family:inherit;
  cursor:pointer;
  transition:opacity 0.15s;
  white-space:nowrap;
}
.lc-qr-btn:hover{opacity:0.8;}

/* ── Attribution line ── */
.lc-attr{
  color:#74C69D;
  font-style:italic;
  font-size:11px;
  margin-top:5px;
  line-height:1.3;
}
</style>
</head>
<body>
<div id="wrap">

  <!-- Header -->
  <div id="hdr">
    <div class="lc-av">
      <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <div class="lc-info">
      <div class="lc-name" id="lc-biz-name">Scheduling Assistant</div>
      <div class="lc-status"><div class="lc-dot"></div>Online — replies instantly</div>
    </div>
    <a id="lc-powered" href="https://app.useleadpro.net" target="_blank" rel="noopener">by LeadPro</a>
  </div>

  <!-- Error banner -->
  <div id="lc-err" role="alert"></div>

  <!-- Messages -->
  <div id="msgs" role="log" aria-label="Chat messages" aria-live="polite">
    <div id="lc-typing" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Lead capture success card (shown after lead is collected) -->
  <div id="lc-success" role="status" aria-label="Booking submitted">
    <div class="lc-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="lc-sc-title">Request submitted!</div>
    <div class="lc-sc-sub">Someone will follow up within a few hours.</div>
    <div class="lc-fields" id="lc-fields"></div>
  </div>

  <!-- Input -->
  <div id="bar">
    <input type="text" id="lc-inp" placeholder="Type a message…" autocomplete="off"
           aria-label="Chat message" maxlength="500">
    <button type="button" id="lc-sbtn" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
'use strict';

// This page is always loaded in an iframe from the LeadPro server,
// so window.location.origin is whichever host serves LeadPro.
var BASE       = window.location.origin;
var params     = new URLSearchParams(window.location.search);
var WIDGET_ID  = params.get('id') || '';

var contractor     = null;
var chatHistory    = [];
var capturedLead   = null;
var busy           = false;
var availableSlots = null; // populated if contractor has Google Calendar connected

/* ── Helpers ── */
function ts() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function el(id) { return document.getElementById(id); }

function addMsg(role, text, attrBizName) {
  var msgs = el('msgs');
  var d = document.createElement('div');
  d.className = 'lc-msg ' + (role === 'user' ? 'user' : 'bot');
  var safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/\n/g, '<br>');
  var attrHtml = '';
  if (attrBizName) {
    var safeBiz = attrBizName.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    attrHtml = '<div class="lc-attr">Responses from ' + safeBiz + '\u2019s AI assistant</div>';
  }
  d.innerHTML =
    '<div class="lc-bubble">' + safe + attrHtml + '</div>' +
    '<div class="lc-ts">' + ts() + '</div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(v) {
  var t = el('lc-typing');
  t.style.display = v ? 'flex' : 'none';
  if (v) el('msgs').scrollTop = el('msgs').scrollHeight;
}

function setDisabled(v) {
  el('lc-inp').disabled  = v;
  el('lc-sbtn').disabled = v;
}

function showErr(msg) {
  var e = el('lc-err');
  e.textContent  = msg;
  e.style.display = msg ? 'block' : 'none';
}

/* ── Load available slots from Google Calendar (if connected) ── */
function getNextWeekdays(n) {
  var days = [];
  var d = new Date();
  d.setHours(0, 0, 0, 0);
  while (days.length < n) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      days.push(d.toISOString().split('T')[0]);
    }
  }
  return days;
}

function loadAvailability() {
  if (!contractor || !contractor.google_connected) return Promise.resolve();
  var dates = getNextWeekdays(3);
  return Promise.all(dates.map(function(date) {
    return fetch(BASE + '/api/availability?contractor_id=' + contractor.id + '&date=' + date)
      .then(function(r) { return r.json(); })
      .catch(function() { return { date: date, slots: [] }; });
  })).then(function(results) {
    availableSlots = results.filter(function(d) { return d.slots && d.slots.length > 0; });
  }).catch(function() {});
}

/* ── API call ── */
function callAPI(messages) {
  var body = JSON.stringify({
    contractorId   : contractor ? contractor.id           : null,
    widgetId       : WIDGET_ID,
    messages       : messages,
    bizName        : contractor ? contractor.business_name : '',
    services       : contractor ? contractor.services      : '',
    availableSlots : availableSlots || undefined
  });
  return fetch(BASE + '/widget-api', {
    method  : 'POST',
    headers : { 'Content-Type': 'application/json' },
    body    : body
  }).then(function(r) {
    if (!r.ok) throw new Error('Server error ' + r.status);
    return r.json();
  });
}

/* ── Lead JSON extractor ── */
function extractLead(raw) {
  var idx = raw.indexOf('LEAD_DATA:');
  if (idx === -1) return null;
  var start = raw.indexOf('{', idx);
  if (start === -1) return null;
  var depth = 0;
  for (var i = start; i < raw.length; i++) {
    if (raw[i] === '{') depth++;
    else if (raw[i] === '}') {
      depth--;
      if (depth === 0) {
        try { return JSON.parse(raw.slice(start, i + 1)); } catch(_) { return null; }
      }
    }
  }
  return null;
}

/* ── Show success card after lead capture ── */
function showSuccessCard(lead) {
  var labels = { name:'Name', phone:'Phone', address:'Address', service:'Service', datetime:'Preferred time' };
  var html   = Object.keys(lead).map(function(k) {
    return '<div class="lc-field"><label>' + (labels[k] || k) + '</label>' +
           '<span>' + (lead[k] || '—') + '</span></div>';
  }).join('');
  el('lc-fields').innerHTML = html;
  var card = el('lc-success');
  card.style.display = 'flex';
  el('msgs').scrollTop = el('msgs').scrollHeight;
  setDisabled(true);
  el('lc-inp').placeholder = 'Your request has been submitted!';
}

/* ── Handle API response ── */
function handleResponse(data) {
  var raw  = (data.content || []).map(function(c){ return c.text || ''; }).join('');
  var lead = extractLead(raw);
  var clean = raw.replace(/LEAD_DATA:\{[\s\S]*?\}(?=\s*$)/, '').trim();

  showTyping(false);
  var bizForAttr = (!lead && contractor && contractor.business_name) ? contractor.business_name : null;
  addMsg('bot', clean || "Sorry, I didn't catch that. Could you try again?", bizForAttr);
  chatHistory.push({ role: 'assistant', content: raw });

  if (lead && !capturedLead) {
    capturedLead = lead;
    showSuccessCard(lead);

    // Post confirmation to server
    fetch(BASE + '/send-confirmation', {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify({
        name         : lead.name     || '',
        phone        : lead.phone    || '',
        address      : lead.address  || '',
        service      : lead.service  || '',
        datetime     : lead.datetime || '',
        contractorId : contractor ? contractor.id           : null,
        bizName      : contractor ? contractor.business_name : ''
      })
    }).catch(function(e){ console.warn('[LeadPro] Confirmation post failed:', e.message); });

    // Book the Google Calendar event if the AI confirmed a real slot
    if (lead.slot_start && lead.slot_end && contractor && contractor.id) {
      fetch(BASE + '/api/book-appointment', {
        method  : 'POST',
        headers : { 'Content-Type': 'application/json' },
        body    : JSON.stringify({
          contractor_id : contractor.id,
          lead_name     : lead.name     || '',
          lead_email    : lead.email    || '',
          lead_phone    : lead.phone    || '',
          service       : lead.service  || '',
          start         : lead.slot_start,
          end           : lead.slot_end,
          notes         : ''
        })
      }).catch(function(e){ console.warn('[LeadPro] Calendar booking failed:', e.message); });
    }

    // Notify parent widget — two events:
    // lp:new_lead  → show the unread badge
    // lp:lead_captured → auto-open the panel to show success
    safePostToParent('lp:new_lead');
    safePostToParent('lp:lead_captured');
  }
}

function safePostToParent(msg) {
  try { window.parent.postMessage(msg, '*'); } catch(_){}
}

/* ── Quick-reply buttons ── */
function showQuickReplies() {
  var msgs = el('msgs');
  var qr = document.createElement('div');
  qr.id = 'lc-qr';
  qr.innerHTML =
    '<button class="lc-qr-btn" data-msg="Get a free estimate">Get a free estimate</button>' +
    '<button class="lc-qr-btn" data-msg="Schedule a service call">Schedule a service call</button>' +
    '<button class="lc-qr-btn" data-msg="Emergency \u2014 need help now">Emergency \u2014 need help now</button>';
  msgs.appendChild(qr);
  msgs.scrollTop = msgs.scrollHeight;

  qr.addEventListener('click', function(e) {
    var btn = e.target.closest('.lc-qr-btn');
    if (!btn) return;
    var text = btn.getAttribute('data-msg');
    qr.remove();
    sendQuickReply(text);
  });
}

function sendQuickReply(text) {
  if (busy || capturedLead) return;
  showErr('');
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  busy = true;
  setDisabled(true);
  showTyping(true);
  callAPI(chatHistory)
    .then(handleResponse)
    .catch(function(e) {
      showTyping(false);
      addMsg('bot', 'Connection error — please try again.');
      console.warn('[LeadPro] sendQuickReply error:', e.message);
    })
    .then(function() {
      busy = false;
      setDisabled(capturedLead != null);
    });
}

/* ── Start / send ── */
function startChat() {
  var bizName = contractor ? contractor.business_name : 'us';
  var welcome = 'Hey! \uD83D\uDC4B Thanks for reaching out to ' + bizName + '. What can we help you with today?';
  addMsg('bot', welcome);
  showQuickReplies();
  // Prime history with the greeting so AI has context on first user reply
  chatHistory = [
    { role: 'user',      content: 'hello' },
    { role: 'assistant', content: welcome }
  ];
}

function sendMsg() {
  if (busy || capturedLead) return;
  var inp  = el('lc-inp');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  showErr('');
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  busy = true;
  setDisabled(true);
  showTyping(true);
  callAPI(chatHistory)
    .then(handleResponse)
    .catch(function(e) {
      showTyping(false);
      addMsg('bot', 'Connection error — please try again.');
      console.warn('[LeadPro] sendMsg error:', e.message);
    })
    .then(function() {
      busy = false;
      setDisabled(capturedLead != null);
    });
}

/* ── Input listeners ── */
el('lc-inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
el('lc-sbtn').addEventListener('click', sendMsg);

/* ── Listen for messages from parent widget ── */
window.addEventListener('message', function(e) {
  if (e.data === 'lp:opened') {
    // Parent widget opened — nothing special needed (could focus input)
    if (!capturedLead) {
      try { el('lc-inp').focus(); } catch(_){}
    }
  }
});

/* ── Signal parent that iframe is ready ── */
safePostToParent('lp:ready');

/* ── Init: fetch contractor info, then availability, then start chat ── */
(function init() {
  if (!WIDGET_ID) { return startChat(); }

  fetch(BASE + '/contractor/' + encodeURIComponent(WIDGET_ID))
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data && data.business_name) {
        contractor = data;
        el('lc-biz-name').textContent = data.business_name + ' — Scheduling';
      }
    })
    .catch(function(){})
    .then(loadAvailability)
    .then(startChat);
})();
</script>
</body>
</html>
