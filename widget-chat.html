<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a4d2e;--green-mid:#2d7a4e;--accent:#4cca74;--bg:#f5f5f3;--bg3:#ebebea;--text:#2c2c2a;--text3:#888780;--border:rgba(0,0,0,0.1);}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#wrap{display:flex;flex-direction:column;height:100%;background:#fff;}

/* Header */
#hdr{background:var(--green);padding:13px 15px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.av{width:36px;height:36px;border-radius:50%;background:#2d7a4e;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.av svg{width:18px;height:18px;fill:#a8d5b5;}
.hn{font-size:13px;font-weight:500;color:#e8f5ec;}
.hs{font-size:11px;color:#7db896;display:flex;align-items:center;gap:4px;margin-top:2px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
#powered{margin-left:auto;font-size:10px;color:#5a8a6a;text-decoration:none;}

/* Messages */
#msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:8px;}
.msg{max-width:83%;display:flex;flex-direction:column;gap:2px;}
.msg.bot{align-self:flex-start;}.msg.user{align-self:flex-end;}
.bubble{padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.5;}
.bot .bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:3px;}
.user .bubble{background:var(--green);color:#e8f5ec;border-bottom-right-radius:3px;}
.ts{font-size:10px;color:var(--text3);padding:0 3px;}.user .ts{text-align:right;}

/* Typing */
#typing{align-self:flex-start;padding:9px 13px;background:var(--bg3);border-radius:14px;border-bottom-left-radius:3px;display:none;gap:4px;align-items:center;}
#typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.2s infinite;display:block;}
#typing span:nth-child(2){animation-delay:.2s}#typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* Lead confirm card */
#lead-confirm{display:none;margin:0 13px 8px;background:#eaf6ef;border:1px solid #b2dcc4;border-radius:10px;padding:11px 13px;}
#lead-confirm .lct{font-size:10px;color:#2d7a4e;text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:7px;}
.lf{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px;}
.lf label{font-size:10px;color:var(--text3);display:block;}
.lf span{font-size:12px;font-weight:500;color:var(--text);}

/* Input */
#bar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;}
#inp{flex:1;border:1px solid rgba(0,0,0,0.18);border-radius:18px;padding:8px 14px;font-size:13px;font-family:inherit;background:var(--bg3);color:var(--text);outline:none;}
#inp:focus{border-color:var(--green-mid);}
#inp:disabled{opacity:.5;}
#sbtn{width:36px;height:36px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#sbtn:hover{background:var(--green-mid);}
#sbtn svg{width:15px;height:15px;fill:#e8f5ec;}
#sbtn:disabled{opacity:.5;cursor:default;}

/* Error */
#err{padding:10px 14px;font-size:12px;color:#a32d2d;background:#fdecea;text-align:center;display:none;}
</style>
</head>
<body>
<div id="wrap">
  <div id="hdr">
    <div class="av"><svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.83 3.36 20.63 2 20.28 2 19.37V4.5A2.5 2.5 0 014.5 2h15A2.5 2.5 0 0122 4.5v10a2.5 2.5 0 01-2.5 2.5H17V8z"/></svg></div>
    <div>
      <div class="hn" id="biz-name">Scheduling Assistant</div>
      <div class="hs"><div class="dot"></div>Online — replies instantly</div>
    </div>
    <a id="powered" href="https://leadpro-1d5l.onrender.com" target="_blank">by LeadPro</a>
  </div>
  <div id="err"></div>
  <div id="msgs">
    <div id="typing"><span></span><span></span><span></span></div>
  </div>
  <div id="lead-confirm">
    <div class="lct">Got your info — someone will follow up shortly!</div>
    <div class="lf" id="lead-fields"></div>
  </div>
  <div id="bar">
    <input type="text" id="inp" placeholder="Type a message..." autocomplete="off">
    <button id="sbtn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
  </div>
</div>

<script>
var BASE = window.location.origin;
var params = new URLSearchParams(window.location.search);
var widgetId = params.get('id') || '';

var contractor = null;
var chatHistory = [];
var capturedLead = null;
var busy = false;

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, text) {
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  d.innerHTML = '<div class="bubble">' + text.replace(/\n/g, '<br>') + '</div><div class="ts">' + now() + '</div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(v) {
  var t = document.getElementById('typing');
  var msgs = document.getElementById('msgs');
  t.style.display = v ? 'flex' : 'none';
  if (v) msgs.scrollTop = msgs.scrollHeight;
}

function setDisabled(v) {
  document.getElementById('inp').disabled = v;
  document.getElementById('sbtn').disabled = v;
}

function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function callAPI(messages) {
  var body = {
    contractorId: contractor ? contractor.id : null,
    messages: messages,
    bizName: contractor ? contractor.business_name : '',
    services: contractor ? contractor.services : ''
  };
  var res = await fetch(BASE + '/widget-api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Server error ' + res.status);
  return res.json();
}

function extractLeadJson(raw) {
  var idx = raw.indexOf('LEAD_DATA:');
  if (idx === -1) return null;
  var start = raw.indexOf('{', idx);
  if (start === -1) return null;
  var depth = 0;
  for (var i = start; i < raw.length; i++) {
    if (raw[i] === '{') depth++;
    else if (raw[i] === '}') { depth--; if (depth === 0) { try { return JSON.parse(raw.slice(start, i + 1)); } catch(e) { return null; } } }
  }
  return null;
}

async function handleResponse(data) {
  var raw = (data.content || []).map(function(c) { return c.text || ''; }).join('');
  var capturedJson = extractLeadJson(raw);
  if (capturedJson && !capturedLead) {
    try {
      capturedLead = capturedJson;
      showLeadCard(capturedLead);
      // Save lead + send confirmation email
      fetch(BASE + '/send-confirmation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: capturedLead.name || '',
          phone: capturedLead.phone || '',
          address: capturedLead.address || '',
          service: capturedLead.service || '',
          datetime: capturedLead.datetime || '',
          contractorId: contractor ? contractor.id : null,
          bizName: contractor ? contractor.business_name : ''
        })
      }).catch(function(e) { console.warn('Confirmation failed:', e.message); });
      // Notify parent frame for badge
      try { window.parent.postMessage('lp:new_lead', '*'); } catch(e) {}
    } catch(e) {}
  }
  var clean = raw.replace(/LEAD_DATA:\{[\s\S]*?\}(?=\s*$)/, '').trim();
  showTyping(false);
  addMsg('bot', clean || 'Sorry, I had trouble with that. Please try again.');
  chatHistory.push({ role: 'assistant', content: raw });
}

async function startChat() {
  chatHistory = [{ role: 'user', content: 'hello' }];
  showTyping(true);
  try {
    var data = await callAPI(chatHistory);
    await handleResponse(data);
  } catch(e) {
    showTyping(false);
    showErr('Could not connect. Please try again.');
  }
}

async function sendMsg() {
  if (busy || capturedLead) return;
  var inp = document.getElementById('inp');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMsg('user', text);
  chatHistory.push({ role: 'user', content: text });
  busy = true;
  setDisabled(true);
  showTyping(true);
  try {
    var data = await callAPI(chatHistory);
    await handleResponse(data);
  } catch(e) {
    showTyping(false);
    addMsg('bot', 'Connection error. Please try again.');
  }
  busy = false;
  setDisabled(capturedLead != null);
}

function showLeadCard(lead) {
  var card = document.getElementById('lead-confirm');
  var labels = { name:'Name', phone:'Phone', address:'Address', service:'Service', datetime:'Preferred time' };
  document.getElementById('lead-fields').innerHTML = Object.entries(lead).map(function(e) {
    return '<div><label>' + (labels[e[0]] || e[0]) + '</label><span>' + (e[1] || '—') + '</span></div>';
  }).join('');
  card.style.display = 'block';
  document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
  // Disable input — conversation is complete
  setDisabled(true);
  document.getElementById('inp').placeholder = 'Booking request submitted!';
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMsg();
});
document.getElementById('sbtn').addEventListener('click', sendMsg);

// ── INIT ──
async function init() {
  if (widgetId) {
    try {
      var r = await fetch(BASE + '/contractor/' + encodeURIComponent(widgetId));
      if (r.ok) {
        contractor = await r.json();
        if (contractor && contractor.business_name) {
          document.getElementById('biz-name').textContent = contractor.business_name + ' — Scheduling';
        }
      }
    } catch(e) { /* proceed without contractor data */ }
  }
  await startChat();
}

init();
</script>
</body>
</html>
